<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Raíces</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

/* Header */
.hdr{background:#1e293b;border-bottom:1px solid #334155;padding:13px 18px;position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:10px}
.hdr-title{font-size:17px;font-weight:700;color:#fff;white-space:nowrap}
.hdr-actions{display:flex;gap:8px;flex-shrink:0}

/* Filter bar */
.fbar{background:#1e293b;border-bottom:1px solid #334155;padding:10px 14px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
.fbar::-webkit-scrollbar{display:none}
.fbtn{padding:5px 14px;border-radius:20px;border:1.5px solid #334155;background:transparent;color:#64748b;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.fbtn:hover{border-color:#64748b;color:#cbd5e1}
.fbtn.active{color:#fff;font-weight:600;border-color:currentColor}
.fbtn.active[data-f="urgente"]{color:#f87171;border-color:#f87171}
.fbtn.active[data-f="todos"]{color:#94a3b8;border-color:#94a3b8}
.fbtn.active[data-f="OCD"]{color:#818cf8}
.fbtn.active[data-f="Suralnor"]{color:#fbbf24}
.fbtn.active[data-f="Cafaratti"]{color:#a78bfa}
.fbtn.active[data-f="Pagani"]{color:#34d399}
.fbtn.active[data-f="Conexxo"]{color:#60a5fa}
.fbtn.active[data-f="Artico"]{color:#22d3ee}
.fbtn.active[data-f="Lactosur"]{color:#fb923c}
.fbtn.active[data-f="Alianzas"]{color:#f472b6}
.fbtn.active[data-f="ADIA"]{color:#a3e635}
.fbtn.active[data-f="Raíces"]{color:#2dd4bf}
.fbtn.active[data-f="Marca Personal"]{color:#c084fc}
.fbtn.active[data-f="General"]{color:#94a3b8}

/* Time sub-filter */
.tbar{background:#0f172a;padding:7px 14px;display:flex;gap:7px}
.tbtn{padding:3px 12px;border-radius:12px;border:1px solid #334155;background:transparent;color:#475569;font-size:12px;cursor:pointer;transition:all .15s}
.tbtn.active{background:#1e293b;color:#cbd5e1;border-color:#475569}

/* Container */
.wrap{padding:14px 16px;max-width:820px;margin:0 auto}

/* Client section */
.cs-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;margin-top:4px;padding:0 2px}
.cs-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cs-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#64748b}
.cs-count{font-size:11px;color:#334155;margin-left:2px}

/* Task card */
.card{background:#1e293b;border:1px solid #334155;border-left:3px solid transparent;border-radius:11px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px;transition:border-color .15s}
.card:hover{border-color:#475569;border-left-color:inherit}
.card-info{flex:1;min-width:0}
.card-nombre{font-size:14px;font-weight:500;color:#e2e8f0;line-height:1.3;margin-bottom:5px}
.card-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tag{font-size:11px;padding:2px 8px;border-radius:9px}
.tag-date{color:#64748b}
.tag-date.late{color:#f87171}
.tag-resp{background:#1e3a5f30;color:#60a5fa;border:1px solid #1e3a5f}
.tag-prog{background:#451a0330;color:#fb923c;border:1px solid #78350f}
.tag-sub{color:#475569;font-style:italic}

/* Inline date edit */
.date-row{display:flex;gap:5px;align-items:center;margin-top:7px}
.date-inp{background:#0f172a;border:1px solid #475569;border-radius:6px;padding:4px 8px;color:#e2e8f0;font-size:12px}
.date-inp:focus{outline:none;border-color:#6366f1}
.btn-sm{padding:4px 10px;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:500}
.btn-sm.save{background:#4f46e5;color:#fff}
.btn-sm.save:hover{background:#4338ca}
.btn-sm.cancel{background:#334155;color:#94a3b8}

/* Card buttons */
.card-btns{display:flex;gap:5px;flex-shrink:0;margin-top:1px}
.icobtn{width:30px;height:30px;border-radius:50%;border:1.5px solid #334155;background:transparent;color:#475569;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.icobtn:hover.done{background:#10b981;border-color:#10b981;color:#fff}
.icobtn:hover.reprogram{background:#4f46e5;border-color:#4f46e5;color:#fff}

/* Buttons */
.btn-primary{padding:8px 15px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-primary:hover{background:#4338ca}
.btn-secondary{padding:8px 14px;background:transparent;color:#64748b;border:1px solid #334155;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap}
.btn-secondary:hover{color:#cbd5e1;border-color:#475569}
.btn-secondary:disabled{opacity:.5;cursor:not-allowed}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:22px;width:100%;max-width:400px}
.modal-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:16px}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.finput,.fselect{width:100%;padding:9px 11px;background:#0f172a;border:1.5px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px;outline:none}
.finput:focus,.fselect:focus{border-color:#6366f1}
.fselect option{background:#1e293b}
.modal-btns{display:flex;gap:8px;margin-top:18px}
.btn-cancel{padding:9px 15px;background:#334155;color:#64748b;border:none;border-radius:8px;font-size:14px;cursor:pointer}
.btn-save{flex:1;padding:9px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn-save:disabled{opacity:.5;cursor:not-allowed}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;padding:11px 18px;border-radius:10px;color:#fff;font-size:13px;font-weight:500;z-index:300;animation:ti .2s ease;pointer-events:none;max-width:calc(100vw - 40px)}
@keyframes ti{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

/* States */
.loading,.empty{text-align:center;padding:50px 16px;color:#334155;font-size:15px}

.cs-mb{margin-bottom:20px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">🌱 Agenda Raíces</div>
  <div class="hdr-actions">
    <button class="btn-secondary" id="btn-sync" onclick="syncSheet()">↻ Sync Sheet</button>
    <button class="btn-primary" onclick="openNewTask()">+ Nueva tarea</button>
  </div>
</div>

<div class="fbar">
  <button class="fbtn active" data-f="urgente" onclick="setFilter('urgente')">🔴 Urgente</button>
  <button class="fbtn" data-f="todos" onclick="setFilter('todos')">Todos</button>
  <button class="fbtn" data-f="OCD" onclick="setFilter('OCD')">📊 OCD</button>
  <button class="fbtn" data-f="Suralnor" onclick="setFilter('Suralnor')">🏗️ Suralnor</button>
  <button class="fbtn" data-f="Cafaratti" onclick="setFilter('Cafaratti')">👔 Cafaratti</button>
  <button class="fbtn" data-f="Pagani" onclick="setFilter('Pagani')">🏭 Pagani</button>
  <button class="fbtn" data-f="Conexxo" onclick="setFilter('Conexxo')">🔗 Conexxo</button>
  <button class="fbtn" data-f="Artico" onclick="setFilter('Artico')">❄️ Artico</button>
  <button class="fbtn" data-f="Lactosur" onclick="setFilter('Lactosur')">🥛 Lactosur</button>
  <button class="fbtn" data-f="Alianzas" onclick="setFilter('Alianzas')">🤝 Alianzas</button>
  <button class="fbtn" data-f="ADIA" onclick="setFilter('ADIA')">🏛️ ADIA</button>
  <button class="fbtn" data-f="Raíces" onclick="setFilter('Raíces')">🌱 Raíces</button>
  <button class="fbtn" data-f="Marca Personal" onclick="setFilter('Marca Personal')">⭐ Marca Personal</button>
  <button class="fbtn" data-f="General" onclick="setFilter('General')">📁 General</button>
</div>

<div class="tbar" id="tbar" style="display:none">
  <button class="tbtn active" data-t="all" onclick="setTime('all')">Todas</button>
  <button class="tbtn" data-t="vigentes" onclick="setTime('vigentes')">Vigentes</button>
  <button class="tbtn" data-t="esta-semana" onclick="setTime('esta-semana')">Esta semana</button>
</div>

<div class="wrap">
  <div class="loading" id="loading">Cargando tareas desde Notion...</div>
  <div id="tasklist"></div>
</div>

<!-- Modal nueva tarea -->
<div class="modal-bg" id="modal-new">
  <div class="modal">
    <div class="modal-title">+ Nueva tarea</div>
    <div class="fg"><label>Nombre *</label><input class="finput" id="nt-nombre" placeholder="Nombre de la tarea..."></div>
    <div class="fg">
      <label>Cliente *</label>
      <select class="fselect" id="nt-cliente">
        <option value="">Seleccioná...</option>
        <option>OCD</option><option>Suralnor</option><option>Cafaratti</option>
        <option>Pagani</option><option>Conexxo</option><option>Artico</option>
        <option>Lactosur</option><option>Alianzas</option><option>ADIA</option>
        <option>Raíces</option><option>Marca Personal</option><option>General</option>
      </select>
    </div>
    <div class="fg">
      <label>Responsable</label>
      <select class="fselect" id="nt-resp"><option>Nacho</option><option>Vicky</option></select>
    </div>
    <div class="fg"><label>Fecha inicio</label><input class="finput" id="nt-inicio" type="date"></div>
    <div class="fg"><label>Fecha fin</label><input class="finput" id="nt-fin" type="date"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeNewTask()">Cancelar</button>
      <button class="btn-save" id="btn-save" onclick="saveNewTask()">Guardar en Notion</button>
    </div>
  </div>
</div>

<script>
const CLIENT_COLORS = {
  'OCD':'#818cf8','Suralnor':'#fbbf24','Cafaratti':'#a78bfa','Pagani':'#34d399',
  'Conexxo':'#60a5fa','Artico':'#22d3ee','Lactosur':'#fb923c','Alianzas':'#f472b6',
  'ADIA':'#a3e635','Raíces':'#2dd4bf','Marca Personal':'#c084fc','General':'#64748b'
};
const CLIENT_ORDER = ['OCD','Suralnor','Cafaratti','Pagani','Conexxo','Artico','Lactosur','Alianzas','ADIA','Raíces','Marca Personal','General'];

let allTasks = [];
let filter = 'urgente';
let timeFilter = 'all';
let editingId = null;

loadTasks();

async function loadTasks() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('tasklist').innerHTML = '';
  try {
    const r = await fetch('/api/tasks');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    allTasks = d.tasks || [];
    render();
  } catch(e) {
    document.getElementById('loading').textContent = '⚠️ Error al cargar: ' + e.message;
  }
}

function setFilter(f) {
  filter = f; editingId = null;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.toggle('active', b.dataset.f === f));
  const showTime = (f !== 'urgente' && f !== 'todos');
  document.getElementById('tbar').style.display = showTime ? 'flex' : 'none';
  if (!showTime) { timeFilter = 'all'; document.querySelectorAll('.tbtn').forEach(b => b.classList.toggle('active', b.dataset.t === 'all')); }
  render();
}

function setTime(t) {
  timeFilter = t;
  document.querySelectorAll('.tbtn').forEach(b => b.classList.toggle('active', b.dataset.t === t));
  render();
}

function filtered() {
  const today = new Date(); today.setHours(0,0,0,0);
  const wkEnd = new Date(today); wkEnd.setDate(wkEnd.getDate() + 7);
  let list = [...allTasks];

  if (filter === 'urgente') {
    list = list.filter(t => {
      if (t.estado === 'En Progreso') return true;
      const d = parseDate(t.fin);
      return d && d <= today;
    });
    if (timeFilter === 'esta-semana') list = list.filter(t => { const d = parseDate(t.fin); return d && d >= today && d <= wkEnd; });
    return list;
  }

  if (filter !== 'todos') {
    list = list.filter(t => t.cliente === filter);
    if (timeFilter === 'esta-semana') list = list.filter(t => { const d = parseDate(t.inicio); return d && d >= today && d <= wkEnd; });
    else if (timeFilter === 'vigentes') list = list.filter(t => { const d = parseDate(t.inicio); return !d || d <= today; });
  }
  return list;
}

function render() {
  document.getElementById('loading').style.display = 'none';
  const list = filtered();
  const el = document.getElementById('tasklist');
  if (!list.length) { el.innerHTML = '<div class="empty">Sin tareas para mostrar 🎉</div>'; return; }

  const today = new Date(); today.setHours(0,0,0,0);

  if (filter === 'urgente' || filter === 'todos') {
    const byClient = {};
    CLIENT_ORDER.forEach(c => { byClient[c] = []; });
    list.forEach(t => { (byClient[t.cliente] || (byClient['General'] = byClient['General'] || [])).push(t); });
    el.innerHTML = CLIENT_ORDER.filter(c => byClient[c]?.length)
      .map(c => `<div class="cs-mb">
        <div class="cs-header">
          <div class="cs-dot" style="background:${CLIENT_COLORS[c]||'#64748b'}"></div>
          <span class="cs-name">${c}</span>
          <span class="cs-count">${byClient[c].length}</span>
        </div>
        ${byClient[c].map(t => cardHTML(t, today)).join('')}
      </div>`).join('');
  } else {
    el.innerHTML = list.map(t => cardHTML(t, today)).join('');
  }
}

function parseDate(iso) {
  if (!iso) return null;
  const [y, m, d] = iso.split('-').map(Number);
  return new Date(y, m-1, d);
}

function fmtDate(iso) {
  if (!iso) return null;
  return parseDate(iso).toLocaleDateString('es-AR',{day:'numeric',month:'short'});
}

function cardHTML(t, today) {
  const fin = parseDate(t.fin);
  const isLate = fin && fin < today;
  const isWip = t.estado === 'En Progreso';
  const color = CLIENT_COLORS[t.cliente] || '#64748b';
  const borderColor = isLate ? '#f87171' : isWip ? '#fb923c' : color;
  const isEditing = editingId === t.id;

  return `<div class="card" id="card-${t.id}" style="border-left-color:${borderColor}">
    <div class="card-info">
      <div class="card-nombre">${esc(t.nombre)}</div>
      <div class="card-meta">
        ${t.fin ? `<span class="tag tag-date${isLate?' late':''}">📅 ${fmtDate(t.fin)}</span>` : ''}
        ${t.inicio ? `<span class="tag tag-date">▶ ${fmtDate(t.inicio)}</span>` : ''}
        ${t.responsable ? `<span class="tag tag-resp">${esc(t.responsable)}</span>` : ''}
        ${isWip ? `<span class="tag tag-prog">En progreso</span>` : ''}
        ${t.sub ? `<span class="tag tag-sub">${esc(t.sub)}</span>` : ''}
      </div>
      ${isEditing ? `
        <div class="date-row">
          <input type="date" class="date-inp" id="di-${t.id}" value="${t.fin||''}">
          <button class="btn-sm save" onclick="saveDate('${t.id}')">Guardar</button>
          <button class="btn-sm cancel" onclick="cancelEdit()">✕</button>
        </div>` : ''}
    </div>
    <div class="card-btns">
      <button class="icobtn reprogram" onclick="startEdit('${t.id}')" title="Reprogramar">📅</button>
      <button class="icobtn done" onclick="markDone('${t.id}')" title="Realizada">✓</button>
    </div>
  </div>`;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function markDone(id) {
  const card = document.getElementById('card-'+id);
  if (card) card.style.opacity = '.4';
  try {
    const r = await fetch('/api/tasks',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,estado:'Realizado'})});
    if (!r.ok) throw new Error(await r.text());
    allTasks = allTasks.filter(t => t.id !== id);
    render();
    toast('Tarea completada ✅','#10b981');
  } catch(e) {
    if (card) card.style.opacity = '1';
    toast('Error: '+e.message,'#ef4444');
  }
}

function startEdit(id) { editingId = id; render(); setTimeout(()=>document.getElementById('di-'+id)?.focus(),50); }
function cancelEdit() { editingId = null; render(); }

async function saveDate(id) {
  const inp = document.getElementById('di-'+id);
  if (!inp?.value) return;
  try {
    const r = await fetch('/api/tasks',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,fin:inp.value})});
    if (!r.ok) throw new Error(await r.text());
    const t = allTasks.find(x => x.id === id);
    if (t) t.fin = inp.value;
    editingId = null; render();
    toast('Fecha actualizada en Notion','#6366f1');
  } catch(e) { toast('Error: '+e.message,'#ef4444'); }
}

function openNewTask() {
  ['nt-nombre','nt-inicio','nt-fin'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('nt-cliente').value = '';
  document.getElementById('nt-resp').value = 'Nacho';
  document.getElementById('modal-new').classList.add('open');
  setTimeout(()=>document.getElementById('nt-nombre').focus(),80);
}
function closeNewTask() { document.getElementById('modal-new').classList.remove('open'); }

async function saveNewTask() {
  const nombre = document.getElementById('nt-nombre').value.trim();
  const cliente = document.getElementById('nt-cliente').value;
  if (!nombre || !cliente) { toast('Falta nombre o cliente','#ef4444'); return; }
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'Guardando...';
  try {
    const body = {
      nombre, cliente,
      responsable: document.getElementById('nt-resp').value,
      inicio: document.getElementById('nt-inicio').value || null,
      fin: document.getElementById('nt-fin').value || null,
    };
    const r = await fetch('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if (!r.ok) throw new Error(await r.text());
    const d = await r.json();
    allTasks.push({id:d.id,nombre,cliente,estado:'Pendiente',inicio:body.inicio,fin:body.fin,responsable:body.responsable,sub:''});
    closeNewTask(); render();
    toast('Tarea creada en Notion ✅','#10b981');
  } catch(e) { toast('Error: '+e.message,'#ef4444'); }
  finally { btn.disabled=false; btn.textContent='Guardar en Notion'; }
}

async function syncSheet() {
  const btn = document.getElementById('btn-sync');
  btn.disabled = true; btn.textContent = 'Sincronizando...';
  try {
    const r = await fetch('/api/sheet',{method:'POST'});
    if (!r.ok) throw new Error(await r.text());
    const d = await r.json();
    if (d.synced > 0) {
      toast(`${d.synced} tarea${d.synced>1?'s':''} nueva${d.synced>1?'s':''} importada${d.synced>1?'s':''} ✅`,'#10b981');
      await loadTasks();
    } else {
      toast('Todo sincronizado, nada nuevo','#6366f1');
    }
  } catch(e) { toast('Error sync: '+e.message,'#ef4444'); }
  finally { btn.disabled=false; btn.textContent='↻ Sync Sheet'; }
}

function toast(msg, bg='#10b981') {
  document.querySelectorAll('.toast').forEach(x=>x.remove());
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg; el.style.background = bg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

document.getElementById('modal-new').addEventListener('click',e=>{if(e.target===e.currentTarget)closeNewTask();});
</script>
</body>
</html>
